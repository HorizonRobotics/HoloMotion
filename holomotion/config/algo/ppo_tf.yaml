# @package _global_

defaults:
  - ppo

algo:
  _target_: holomotion.src.algo.ppo_tf.PPOTF
  config:
    num_steps_per_env: 32
    kl_coef: 0.0
    schedule: adaptive
    actor_learning_rate: 3.0e-5
    critic_learning_rate: 5.0e-5
    save_interval: 1000

    num_learning_epochs: 3
    num_mini_batches: 24

    clip_param: 0.2
    entropy_coef: 5.0e-3
    desired_kl: 0.01
    noise_std_type: log
    fix_sigma: false
    init_noise_std: 1.0
    min_sigma: 0.01
    max_sigma: 1.2

    aux_state_pred:
      enabled: true
      w_keybody_contact: 1.0e-2
      w_base_lin_vel: 1.0e-2
      w_ref_keybody_rel_pos: 1.0e-1
      w_robot_keybody_rel_pos: 1.0e-1

      min_std: 0.01
      max_std: 2.0

      keybody_contact_names:
        - left_hip_pitch_link
        - right_hip_pitch_link
        - left_knee_link
        - right_knee_link
        - left_ankle_roll_link
        - right_ankle_roll_link
        - left_elbow_link
        - right_elbow_link
        - left_wrist_yaw_link
        - right_wrist_yaw_link

      keybody_rel_pos_names:
        - left_knee_link
        - right_knee_link
        - left_ankle_roll_link
        - right_ankle_roll_link
        - left_elbow_link
        - right_elbow_link
        - left_wrist_yaw_link
        - right_wrist_yaw_link

    inactive_expert_margin_to_topk:
      enabled: true
      weight: 10
      ratio_floor: 0.1

    aux_router_command_recon:
      enabled: false
      weight: 0.0
      hidden_dim: 0
      term_prefix: actor_ref_

    aux_router_switch_penalty:
      enabled: false
      weight: 0.0

    moe_load_balance:
      enabled: false
      weight: 0.0

    router_expert_orthogonal:
      enabled: false
      weight: 0.0
      min_active_usage: 1.0e-3
      eps: 1.0e-8

    selected_expert_margin_to_unselected:
      enabled: false
      weight: 0.0
      target: 0.0

    moe_router:
      routing_score_fn: softmax
      routing_scale: 1.0
      use_dynamic_bias: false
      bias_update_rate: 0.001
      expert_bias_clip: 0.0
